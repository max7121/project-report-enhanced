<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&D 專案會報簡報 (含人力負載分析)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PptxGenJS for PowerPoint Export -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        
        window.firebase = { initializeApp, getFirestore, collection, onSnapshot };
    </script>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react"
        }
    }
    </script>
    
    <style>
        /* 自定義字體與動畫 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #0f172a; /* Slate 900 */
            color: #1e293b;
            overflow: hidden;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        /* 投影片過渡動畫 */
        .fade-enter {
            opacity: 0;
            transform: scale(0.98);
        }
        .fade-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 300ms ease-out, transform 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* 滾動條美化 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* 雷射筆游標樣式 */
        .cursor-laser {
            cursor: none !important;
        }
        #laser-dot {
            position: fixed;
            width: 20px;
            height: 20px;
            background: rgba(239, 68, 68, 0.8);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.8), 0 0 20px rgba(239, 68, 68, 0.4);
            transition: transform 0.05s linear;
            mix-blend-mode: hard-light;
        }

        /* 列印設定 */
        @media print {
            @page {
                size: A4 landscape;
                margin: 0;
            }
            body {
                background: white;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                overflow: visible;
            }
            .no-print { display: none !important; }
            .slide-container {
                width: 100% !important;
                height: 100% !important;
                padding: 0 !important;
                display: block !important;
            }
            .slide {
                box-shadow: none !important;
                border-radius: 0 !important;
                page-break-after: always;
                height: 100vh !important;
                width: 100vw !important;
            }
            /* 強制背景色列印 */
            .bg-gradient-to-br {
                background-color: #f8fafc !important; /* Fallback */
            }
            /* 列印時隱藏側邊欄 */
            .drawer-panel {
                display: none !important;
            }
        }
        
        .slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            transition: padding 0.3s ease;
        }

        .slide-container.focus-mode {
            padding: 0;
        }
        
        .slide {
            width: 100%;
            max-width: 1600px;
            aspect-ratio: 16/9;
            height: auto;
            max-height: 90vh;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .slide-container.focus-mode .slide {
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 0;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import ReactDOM from 'react-dom/client';
        import React, { useState, useEffect, useMemo, memo, useRef } from 'react';
        import { 
            ChevronLeft, ChevronRight, Printer, Home, 
            FileText, MessageSquare, AlertTriangle, ListTodo,
            TrendingUp, Users, Target, CheckCircle, Calendar,
            Clock, ArrowRight, MousePointer2, Maximize2, Minimize2,
            PenTool, Timer, Plus, Trash2, Save, X, Activity, User, BarChart2,
            Download
        } from 'lucide-react';

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyCMQqRd2JQlRpBsERWUkUpAqFSGBM_UmP0",
            authDomain: "rdsystemdatabase.firebaseapp.com",
            projectId: "rdsystemdatabase",
            storageBucket: "rdsystemdatabase.firebasestorage.app",
            messagingSenderId: "321370607244",
            appId: "1:321370607244:web:eaf0c8dc0ea9ca8212f5a9",
            measurementId: "G-T9PL70TLJ2"
        };

        const app = window.firebase.initializeApp(firebaseConfig);
        const db = window.firebase.getFirestore(app);

        // --- 功能組件: 會議計時器 ---
        const MeetingTimer = memo(() => {
            const [time, setTime] = useState(0);
            const [isRunning, setIsRunning] = useState(false);

            useEffect(() => {
                let interval;
                if (isRunning) {
                    interval = setInterval(() => setTime(t => t + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [isRunning]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            return (
                <div className="flex items-center gap-2 bg-slate-800 text-white px-3 py-1.5 rounded-lg border border-slate-700 shadow-inner">
                    <Timer size={14} className={isRunning ? "text-green-400" : "text-slate-400"} />
                    <span className="font-mono text-sm font-bold min-w-[3rem] text-center">{formatTime(time)}</span>
                    <button 
                        onClick={() => setIsRunning(!isRunning)}
                        className={`text-xs px-2 py-0.5 rounded ${isRunning ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'} hover:opacity-80`}
                    >
                        {isRunning ? 'STOP' : 'START'}
                    </button>
                    <button onClick={() => { setIsRunning(false); setTime(0); }} className="text-xs text-slate-400 hover:text-white">↺</button>
                </div>
            );
        });

        // --- 功能組件: 會議記錄板 (Local Storage) ---
        const MeetingNotes = ({ projectId }) => {
            const [notes, setNotes] = useState([]);
            const [input, setInput] = useState('');

            // Load notes
            useEffect(() => {
                if (!projectId) return;
                const saved = localStorage.getItem(`meeting_notes_${projectId}`);
                if (saved) {
                    setNotes(JSON.parse(saved));
                } else {
                    setNotes([]);
                }
            }, [projectId]);

            // Save notes
            const saveNotes = (newNotes) => {
                setNotes(newNotes);
                localStorage.setItem(`meeting_notes_${projectId}`, JSON.stringify(newNotes));
            };

            const addNote = () => {
                if (!input.trim()) return;
                const newNote = {
                    id: Date.now(),
                    text: input,
                    date: new Date().toISOString(),
                    done: false
                };
                saveNotes([newNote, ...notes]);
                setInput('');
            };

            const toggleDone = (id) => {
                const newNotes = notes.map(n => n.id === id ? { ...n, done: !n.done } : n);
                saveNotes(newNotes);
            };

            const deleteNote = (id) => {
                saveNotes(notes.filter(n => n.id !== id));
            };

            return (
                <div className="flex flex-col h-full bg-white">
                    <div className="p-4 border-b border-slate-100 bg-slate-50">
                        <h3 className="font-bold text-slate-800 flex items-center gap-2">
                            <PenTool size={16} className="text-indigo-600"/>
                            會議記錄 & 待辦
                        </h3>
                        <p className="text-xs text-slate-500 mt-1">記錄將自動儲存於此瀏覽器</p>
                    </div>
                    
                    <div className="p-3 border-b border-slate-100">
                        <div className="flex gap-2">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && addNote()}
                                placeholder="輸入交辦事項..."
                                className="flex-1 text-sm px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500"
                            />
                            <button 
                                onClick={addNote}
                                className="p-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors"
                            >
                                <Plus size={18} />
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar">
                        {notes.length === 0 ? (
                            <div className="text-center text-slate-400 py-8 text-sm italic">
                                尚無記錄
                            </div>
                        ) : (
                            notes.map(note => (
                                <div key={note.id} className={`group flex items-start gap-2 p-2 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-all ${note.done ? 'opacity-50' : ''}`}>
                                    <button 
                                        onClick={() => toggleDone(note.id)}
                                        className={`mt-1 w-4 h-4 rounded border flex items-center justify-center ${note.done ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300'}`}
                                    >
                                        {note.done && <CheckCircle size={12} />}
                                    </button>
                                    <div className="flex-1 min-w-0">
                                        <p className={`text-sm text-slate-700 break-words ${note.done ? 'line-through' : ''}`}>{note.text}</p>
                                        <p className="text-[10px] text-slate-400 mt-0.5">
                                            {new Date(note.date).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' })}
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => deleteNote(note.id)}
                                        className="text-slate-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                                    >
                                        <Trash2 size={14} />
                                    </button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        // --- 子組件: 頁首 ---
        const ProjectHeader = memo(({ project, machine, currentSlide, totalProjects, subTitle }) => (
            <div className="flex items-start justify-between mb-6 shrink-0">
                <div className="flex-1">
                    <div className="flex items-center gap-4 mb-3">
                        <span className="px-3 py-1 bg-indigo-600 text-white text-xs font-bold rounded-full tracking-wider uppercase shadow-sm">
                            Project {Math.ceil(currentSlide / 2)} / {totalProjects}
                        </span>
                        <h2 className="text-4xl font-black text-slate-800 tracking-tight flex items-baseline gap-4">
                            {machine?.name || project.name}
                            <span className="text-2xl font-light text-slate-400">| {subTitle}</span>
                        </h2>
                    </div>
                    <div className="flex gap-6 text-sm text-slate-500 font-medium">
                        <span className="flex items-center gap-1.5 bg-slate-100 px-3 py-1 rounded-full">
                            <span className="text-indigo-500">📦</span> {machine?.code || 'N/A'}
                        </span>
                        <span className="flex items-center gap-1.5 bg-slate-100 px-3 py-1 rounded-full">
                            <span className="text-indigo-500">👤</span> {project.leader || machine?.members || '未指派'}
                        </span>
                        <span className="flex items-center gap-1.5 bg-slate-100 px-3 py-1 rounded-full">
                            <span className="text-indigo-500">📅</span> 截止: {project.deadline || '未設定'}
                        </span>
                    </div>
                </div>
                <div className="text-right">
                    <div className="flex items-end justify-end gap-2 mb-1">
                        <span className="text-6xl font-black text-indigo-600 leading-none">
                            {project.progress || 0}
                        </span>
                        <span className="text-xl font-bold text-slate-400 mb-2">%</span>
                    </div>
                    <div className="w-48 h-3 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                        <div 
                            className="h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 transition-all duration-1000 ease-out" 
                            style={{width: `${project.progress || 0}%`}}
                        ></div>
                    </div>
                </div>
            </div>
        ));

        // --- 子組件: 人力資源負載圖 ---
        const ResourceWorkload = memo(({ tasks }) => {
            const workload = useMemo(() => {
                const load = {};
                // 只計算未完成的任務 (To Do, Doing, Review)
                const activeTasks = tasks.filter(t => t.status !== 'Done');
                
                activeTasks.forEach(t => {
                    const assignee = t.owner || 'Unassigned';
                    if (!load[assignee]) {
                        load[assignee] = { total: 0, doing: 0, todo: 0, review: 0 };
                    }
                    load[assignee].total += 1;
                    if (t.status === 'Doing') load[assignee].doing += 1;
                    if (t.status === 'To Do') load[assignee].todo += 1;
                    if (t.status === 'Review') load[assignee].review += 1;
                });

                // 排序:總量多的在上面
                return Object.entries(load)
                    .sort((a, b) => b[1].total - a[1].total)
                    .slice(0, 5); // 只顯示前 5 名
            }, [tasks]);

            if (workload.length === 0) {
                return (
                    <div className="h-full flex items-center justify-center text-slate-400 text-sm italic">
                        尚無活躍任務指派
                    </div>
                );
            }

            // 找出最大值以計算比例
            const maxLoad = Math.max(...workload.map(([_, data]) => data.total));

            return (
                <div className="flex flex-col h-full overflow-y-auto custom-scrollbar pr-2 space-y-3">
                    {workload.map(([name, data], idx) => (
                        <div key={name} className="flex items-center gap-3">
                            <div className="w-20 text-right">
                                <div className="text-xs font-bold text-slate-700 truncate" title={name}>{name}</div>
                            </div>
                            <div className="flex-1 h-6 bg-slate-100 rounded-full overflow-hidden flex">
                                {/* Doing */}
                                <div 
                                    className="bg-blue-500 h-full" 
                                    style={{width: `${(data.doing / maxLoad) * 100}%`}}
                                    title={`Doing: ${data.doing}`}
                                ></div>
                                {/* Review */}
                                <div 
                                    className="bg-amber-400 h-full" 
                                    style={{width: `${(data.review / maxLoad) * 100}%`}}
                                    title={`Review: ${data.review}`}
                                ></div>
                                {/* To Do */}
                                <div 
                                    className="bg-slate-300 h-full" 
                                    style={{width: `${(data.todo / maxLoad) * 100}%`}}
                                    title={`To Do: ${data.todo}`}
                                ></div>
                            </div>
                            <div className="w-8 text-xs font-bold text-slate-500 text-left">
                                {data.total}
                            </div>
                        </div>
                    ))}
                    <div className="flex justify-end gap-3 text-[10px] text-slate-400 pt-2 border-t border-slate-100 mt-auto">
                        <span className="flex items-center gap-1"><div className="w-2 h-2 bg-blue-500 rounded-full"></div>Doing</span>
                        <span className="flex items-center gap-1"><div className="w-2 h-2 bg-amber-400 rounded-full"></div>Review</span>
                        <span className="flex items-center gap-1"><div className="w-2 h-2 bg-slate-300 rounded-full"></div>To Do</span>
                    </div>
                </div>
            );
        });

        // --- 子組件: 甘特圖 (支援詳細模式) ---
        const GanttChart = memo(({ tasks, fullMode = false }) => {
            const { dateInfo, sortedTasks } = useMemo(() => {
                const tasksWithDates = tasks.filter(t => t.startDate && t.endDate);
                if (tasksWithDates.length === 0) return { dateInfo: null, sortedTasks: [] };
                
                const allDates = tasksWithDates.flatMap(t => [new Date(t.startDate), new Date(t.endDate)]);
                const minDate = new Date(Math.min(...allDates));
                const maxDate = new Date(Math.max(...allDates));
                
                minDate.setDate(minDate.getDate() - 2);
                maxDate.setDate(maxDate.getDate() + 5);

                const totalDuration = maxDate - minDate;
                
                // Full Mode 顯示更多任務
                const displayTasks = fullMode 
                    ? tasksWithDates.sort((a, b) => new Date(a.startDate) - new Date(b.startDate))
                    : tasksWithDates.sort((a, b) => new Date(a.startDate) - new Date(b.startDate)).slice(0, 8);

                return {
                    dateInfo: { minDate, maxDate, totalDuration },
                    sortedTasks: displayTasks
                };
            }, [tasks, fullMode]);

            // 計算「今天」的偏移量
            const todayOffset = useMemo(() => {
                if (!dateInfo) return -1;
                const today = new Date();
                const offset = ((today - dateInfo.minDate) / dateInfo.totalDuration) * 100;
                return offset;
            }, [dateInfo]);

            const isTodayVisible = todayOffset >= 0 && todayOffset <= 100;

            if (!dateInfo) {
                return (
                    <div className="h-full flex flex-col items-center justify-center text-slate-400 bg-slate-50/50 rounded-xl border-2 border-dashed border-slate-200">
                        <Calendar className="w-8 h-8 mb-2 opacity-50" />
                        <span className="text-sm">尚無任務時程資料</span>
                    </div>
                );
            }

            const statusStyles = {
                'To Do': 'bg-slate-400',
                'Doing': 'bg-blue-500',
                'Review': 'bg-amber-400',
                'Done': 'bg-emerald-500'
            };

            if (fullMode) {
                return (
                    <div className="flex h-full border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm flex-col">
                         {/* Header */}
                        <div className="flex border-b border-slate-200 bg-slate-50 text-xs font-bold text-slate-500 uppercase tracking-wider relative z-20">
                            <div className="w-1/3 p-3 border-r border-slate-200 pl-6">Task Details</div>
                            <div className="flex-1 p-3 flex justify-between px-6 relative">
                                <span>{dateInfo.minDate.toLocaleDateString('zh-TW')}</span>
                                {isTodayVisible && (
                                    <div className="absolute top-0 bottom-0 flex flex-col items-center z-30" style={{left: `calc(${todayOffset}% + 24px)`, transform: 'translateX(-50%)'}}>
                                        <div className="bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap mt-1">
                                            Today
                                        </div>
                                        <div className="w-px h-2 bg-red-500"></div>
                                    </div>
                                )}
                                <span>Timeline ({Math.ceil(dateInfo.totalDuration / (1000 * 60 * 60 * 24))} Days)</span>
                                <span>{dateInfo.maxDate.toLocaleDateString('zh-TW')}</span>
                            </div>
                        </div>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar relative">
                            {/* 全域背景格線與今天線 (對齊Bar區域) */}
                            <div className="absolute inset-0 pointer-events-none z-0">
                                <div className="flex h-full w-full">
                                    <div className="w-1/3 border-r border-slate-100 bg-slate-50/30"></div>
                                    <div className="flex-1 relative mx-6"> {/* mx-6 對應 px-6 padding */}
                                        {/* Grid Lines */}
                                        {[0, 25, 50, 75, 100].map(p => (
                                            <div key={p} className="absolute top-0 bottom-0 border-l border-slate-100 border-dashed" style={{left: `${p}%`}}></div>
                                        ))}
                                        {/* Today Line */}
                                        {isTodayVisible && (
                                            <div className="absolute top-0 bottom-0 border-l-2 border-red-500/60 border-dashed z-10" style={{left: `${todayOffset}%`}}></div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {sortedTasks.map((task, idx) => {
                                const start = new Date(task.startDate);
                                const end = new Date(task.endDate);
                                const offset = ((start - dateInfo.minDate) / dateInfo.totalDuration) * 100;
                                const width = ((end - start) / dateInfo.totalDuration) * 100;
                                const isEven = idx % 2 === 0;

                                return (
                                    <div key={task.id} className={`relative z-10 flex h-12 border-b border-slate-100 hover:bg-indigo-50/20 transition-colors ${isEven ? 'bg-white/50' : 'bg-slate-50/30'}`}>
                                        {/* Left: Info */}
                                        <div className="w-1/3 flex items-center px-6 border-r border-slate-100/0">
                                            <div className={`w-2.5 h-2.5 rounded-full mr-3 ${statusStyles[task.status] || 'bg-slate-300'}`}></div>
                                            <div className="flex-1 min-w-0 mr-4">
                                                <div className="text-sm font-semibold text-slate-700 truncate" title={task.title}>{task.title || task.name}</div>
                                                <div className="text-[10px] text-slate-400 flex items-center gap-2">
                                                    <span className="truncate">{task.status}</span>
                                                    {task.risk && <span className="text-red-500 flex items-center gap-1"><AlertTriangle size={10}/> Risk</span>}
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end min-w-[80px]">
                                                <div className="flex items-center gap-1 text-xs font-medium text-slate-600 bg-slate-100 px-2 py-0.5 rounded-full">
                                                    <User size={10} /> {task.owner || 'Unassigned'}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Right: Bar */}
                                        <div className="flex-1 relative flex items-center px-6">
                                            {/* Note: Grid lines are now in the background container */}
                                            <div className="w-full h-5 bg-slate-100 rounded-full overflow-hidden relative shadow-inner">
                                                <div 
                                                    className={`absolute h-full rounded-full ${statusStyles[task.status] || 'bg-slate-300'} shadow-sm flex items-center px-2`}
                                                    style={{ 
                                                        left: `${Math.max(0, offset)}%`, 
                                                        width: `${Math.max(width, 1)}%`,
                                                        minWidth: '20px'
                                                    }}
                                                >
                                                    {width > 10 && (
                                                        <span className="text-[9px] text-white font-bold whitespace-nowrap drop-shadow-md">
                                                            {start.getMonth()+1}/{start.getDate()} - {end.getMonth()+1}/{end.getDate()}
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            // Compact Mode (Original)
            return (
                <div className="flex flex-col h-full overflow-hidden">
                    <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 px-1 border-b border-slate-100 pb-1">
                        <span>{dateInfo.minDate.toLocaleDateString('zh-TW')}</span>
                        <span>Total: {Math.ceil(dateInfo.totalDuration / (1000 * 60 * 60 * 24))} Days</span>
                        <span>{dateInfo.maxDate.toLocaleDateString('zh-TW')}</span>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto pr-2 space-y-3 custom-scrollbar">
                        {sortedTasks.map((task) => {
                            const start = new Date(task.startDate);
                            const end = new Date(task.endDate);
                            const offset = ((start - dateInfo.minDate) / dateInfo.totalDuration) * 100;
                            const width = ((end - start) / dateInfo.totalDuration) * 100;

                            return (
                                <div key={task.id} className="relative group">
                                    <div className="flex justify-between items-baseline mb-1">
                                        <div className="text-xs font-semibold text-slate-700 truncate w-32" title={task.title || task.name}>
                                            {task.title || task.name}
                                        </div>
                                        <div className="text-[10px] text-slate-400">
                                            {task.owner}
                                        </div>
                                    </div>
                                    <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden relative">
                                        <div 
                                            className={`absolute h-full rounded-full ${statusStyles[task.status] || 'bg-slate-300'} shadow-sm transition-all duration-500`}
                                            style={{ 
                                                left: `${Math.max(0, offset)}%`, 
                                                width: `${Math.max(width, 2)}%`
                                            }}
                                        />
                                        {/* Today Marker for Compact Mode */}
                                        {isTodayVisible && (
                                            <div 
                                                className="absolute top-0 bottom-0 border-l-2 border-red-500 z-10 h-full" 
                                                style={{left: `${todayOffset}%`}} 
                                                title="Today"
                                            ></div>
                                        )}
                                    </div>
                                    <div className="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none">
                                        {start.toLocaleDateString()} - {end.toLocaleDateString()} ({task.status})
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        });

        // --- 子組件: 統計卡片 ---
        const TaskStats = memo(({ tasks }) => {
            const stats = useMemo(() => ({
                todo: tasks.filter(t => t.status === 'To Do').length,
                doing: tasks.filter(t => t.status === 'Doing').length,
                review: tasks.filter(t => t.status === 'Review').length,
                done: tasks.filter(t => t.status === 'Done').length,
                risk: tasks.filter(t => t.risk).length
            }), [tasks]);

            return (
                <div className="grid grid-cols-4 gap-4 h-full">
                    {[
                        { label: '待處理', count: stats.todo, color: 'text-slate-500', bg: 'bg-slate-50' },
                        { label: '進行中', count: stats.doing, color: 'text-blue-600', bg: 'bg-blue-50' },
                        { label: '審核中', count: stats.review, color: 'text-amber-600', bg: 'bg-amber-50' },
                        { label: '已完成', count: stats.done, color: 'text-emerald-600', bg: 'bg-emerald-50' },
                    ].map((item, idx) => (
                        <div key={idx} className={`${item.bg} rounded-xl flex flex-col items-center justify-center p-2 border border-slate-100 shadow-sm`}>
                            <span className={`text-3xl font-black ${item.color} mb-1`}>{item.count}</span>
                            <span className="text-xs font-medium text-slate-500">{item.label}</span>
                        </div>
                    ))}
                    {stats.risk > 0 && (
                        <div className="col-span-4 mt-auto flex items-center justify-center gap-2 bg-red-50 text-red-600 py-2 rounded-lg text-sm font-bold border border-red-100 animate-pulse">
                            <AlertTriangle size={16} />
                            <span>{stats.risk} 個風險任務需關注</span>
                        </div>
                    )}
                </div>
            );
        });

        // --- 主組件 1: 專案總覽頁 (Overview) ---
        const ProjectOverviewSlide = ({ project, currentSlide, totalProjects, machines, tasks, messages, toggleNotes }) => {
            const machine = useMemo(() => machines.find(m => m.id === project.machineId), [machines, project.machineId]);
            const projectMessages = useMemo(() => messages.filter(msg => msg.projectId === project.id).slice(-6).reverse(), [messages, project.id]);
            const projectTasks = useMemo(() => tasks.filter(t => t.projectId === project.id), [tasks, project.id]);

            return (
                <div className="h-full flex flex-col p-10 bg-gradient-to-br from-slate-50 to-indigo-50/30 fade-enter-active">
                    <ProjectHeader 
                        project={project} 
                        machine={machine} 
                        currentSlide={currentSlide} 
                        totalProjects={totalProjects} 
                        subTitle="Project Overview"
                    />
                    
                    <div className="grid grid-cols-12 gap-6 flex-1 min-h-0 relative">
                        {/* 左欄:設計規格 + 人力負載 (各佔 60% / 40%) */}
                        <div className="col-span-7 flex flex-col gap-6">
                            {/* 設計規格 (Flex: 3) */}
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col flex-[3] min-h-0">
                                <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-3">
                                    <div className="p-2 bg-blue-100 rounded-xl"><FileText size={20} className="text-blue-600"/></div>
                                    設計規格與備註
                                </h3>
                                <div className="text-slate-600 text-base leading-relaxed overflow-y-auto flex-1 pr-2 custom-scrollbar whitespace-pre-line bg-slate-50 p-4 rounded-xl border border-slate-100">
                                    {project.specs || machine?.description || '尚未填寫規格說明...'}
                                </div>
                            </div>

                             {/* 人力負載分析 (Flex: 2) - 新增區塊 */}
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col flex-[2] min-h-0">
                                <h3 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                                    <div className="p-1.5 bg-orange-100 rounded-lg"><BarChart2 size={18} className="text-orange-600"/></div>
                                    人力資源負載 (Workload)
                                </h3>
                                <div className="flex-1 min-h-0">
                                    <ResourceWorkload tasks={projectTasks} />
                                </div>
                            </div>
                        </div>
                        
                        {/* 右欄:統計與討論 */}
                        <div className="col-span-5 flex flex-col gap-6">
                            {/* Stats */}
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 h-1/3">
                                <h3 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                                    <div className="p-1.5 bg-green-100 rounded-lg"><ListTodo size={18} className="text-green-600"/></div>
                                    任務狀態分佈
                                </h3>
                                <TaskStats tasks={projectTasks} />
                            </div>
                            
                            {/* Chat */}
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col flex-1 min-h-0">
                                <h3 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2 justify-between">
                                    <div className="flex items-center gap-2">
                                        <div className="p-1.5 bg-purple-100 rounded-lg"><MessageSquare size={18} className="text-purple-600"/></div>
                                        近期討論 ({projectMessages.length})
                                    </div>
                                    <button onClick={toggleNotes} className="text-xs text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 px-2 py-1 rounded transition-colors flex items-center gap-1">
                                        <PenTool size={12}/> 寫筆記
                                    </button>
                                </h3>
                                <div className="space-y-3 overflow-y-auto flex-1 pr-2 custom-scrollbar">
                                    {projectMessages.length > 0 ? projectMessages.map((msg, idx) => (
                                        <div key={idx} className="bg-slate-50 p-3 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors">
                                            <div className="flex justify-between items-start mb-1.5">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-6 h-6 rounded-full bg-indigo-100 flex items-center justify-center text-[10px] font-bold text-indigo-600">
                                                        {msg.user?.[0] || 'U'}
                                                    </div>
                                                    <span className="font-bold text-slate-700 text-sm">{msg.user}</span>
                                                </div>
                                                <span className="text-[10px] text-slate-400 font-medium">
                                                    {msg.timestamp ? new Date(msg.timestamp).toLocaleDateString() : ''}
                                                </span>
                                            </div>
                                            <p className="text-xs text-slate-600 leading-normal">{msg.content || msg.message}</p>
                                        </div>
                                    )) : (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                            <span className="text-sm">暫無討論記錄</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主組件 2: 專案時程頁 (Full Gantt) ---
        const ProjectGanttSlide = ({ project, currentSlide, totalProjects, machines, tasks }) => {
            const machine = useMemo(() => machines.find(m => m.id === project.machineId), [machines, project.machineId]);
            const projectTasks = useMemo(() => tasks.filter(t => t.projectId === project.id), [tasks, project.id]);

            return (
                <div className="h-full flex flex-col p-10 bg-white fade-enter-active">
                    <ProjectHeader 
                        project={project} 
                        machine={machine} 
                        currentSlide={currentSlide} 
                        totalProjects={totalProjects} 
                        subTitle="Detailed Schedule"
                    />
                    
                    <div className="flex-1 min-h-0 flex flex-col">
                        <div className="flex items-center justify-between mb-4 px-1">
                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <div className="p-2 bg-indigo-100 rounded-lg"><Target size={20} className="text-indigo-600"/></div>
                                完整專案時程表 ({projectTasks.length} Tasks)
                            </h3>
                            <div className="flex gap-4 text-sm text-slate-500">
                                <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-slate-400"></div> To Do</span>
                                <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-blue-500"></div> Doing</span>
                                <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-amber-400"></div> Review</span>
                                <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-emerald-500"></div> Done</span>
                            </div>
                        </div>
                        <div className="flex-1 min-h-0">
                            <GanttChart tasks={projectTasks} fullMode={true} />
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主程式 ---
        const ProjectReportPresentation = () => {
            const [currentSlideIndex, setCurrentSlideIndex] = useState(0);
            const [projects, setProjects] = useState([]);
            const [machines, setMachines] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(true);

            // 簡報工具狀態
            const [isFocusMode, setIsFocusMode] = useState(false);
            const [showNotes, setShowNotes] = useState(false);
            const [laserMode, setLaserMode] = useState(false);
            
            // 雷射筆邏輯
            useEffect(() => {
                if (!laserMode) return;
                const dot = document.createElement('div');
                dot.id = 'laser-dot';
                document.body.appendChild(dot);
                document.body.classList.add('cursor-laser');
                const moveLaser = (e) => {
                    dot.style.left = `${e.clientX - 10}px`;
                    dot.style.top = `${e.clientY - 10}px`;
                };
                window.addEventListener('mousemove', moveLaser);
                return () => {
                    window.removeEventListener('mousemove', moveLaser);
                    document.body.removeChild(dot);
                    document.body.classList.remove('cursor-laser');
                };
            }, [laserMode]);

            useEffect(() => {
                let unsubscribeFuncs = [];
                const collections = ['rd_projects', 'rd_machines', 'rd_tasks', 'rd_messages'];
                const setters = [setProjects, setMachines, setTasks, setMessages];

                collections.forEach((colName, index) => {
                    const unsub = window.firebase.onSnapshot(
                        window.firebase.collection(db, colName),
                        (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setters[index](data);
                            if (index === 1) setLoading(false);
                        },
                        (error) => console.error(`Error fetching ${colName}:`, error)
                    );
                    unsubscribeFuncs.push(unsub);
                });

                return () => unsubscribeFuncs.forEach(fn => fn());
            }, []);

            const activeProjects = useMemo(() => {
                return projects.filter(p => {
                    if (!p.machineId) return false;
                    const machine = machines.find(m => m.id === p.machineId);
                    return machine && machine.status === 'Active' && p.progress < 100;
                });
            }, [projects, machines]);

            // 計算總頁數: 1 (Cover) + 1 (Resource Overview) + Projects * 2 (Overview + Gantt)
            const totalSlides = 2 + (activeProjects.length * 2);

            // PPT 生成功能
            const generatePPT = async () => {
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';
                pptx.author = 'R&D Nexus System';
                pptx.company = 'TQM';
                pptx.title = 'R&D 專案會報簡報';
                pptx.subject = '研發專案執行進度與團隊工作分析';

                // 封面頁 - 精美設計
                const coverSlide = pptx.addSlide();
                
                // 漸層背景
                coverSlide.background = { color: '0F172A' };
                
                // 裝飾圓形背景
                coverSlide.addShape(pptx.ShapeType.ellipse, {
                    x: 7.5, y: -0.5, w: 3, h: 3,
                    fill: { color: '4F46E5', transparency: 85 }
                });
                coverSlide.addShape(pptx.ShapeType.ellipse, {
                    x: -0.5, y: 4.5, w: 2.5, h: 2.5,
                    fill: { color: '7C3AED', transparency: 85 }
                });
                
                // 狀態指示器
                coverSlide.addShape(pptx.ShapeType.rect, {
                    x: 0.5, y: 0.5, w: 1.5, h: 0.28,
                    fill: { color: 'FFFFFF', transparency: 90 },
                    line: { color: '4ADE80', width: 1 }
                });
                coverSlide.addShape(pptx.ShapeType.ellipse, {
                    x: 0.6, y: 0.6, w: 0.08, h: 0.08,
                    fill: { color: '4ADE80' }
                });
                coverSlide.addText('LIVE SESSION', {
                    x: 0.75, y: 0.55, w: 1.1, h: 0.18,
                    fontSize: 8, bold: true, color: '4ADE80',
                    align: 'left'
                });
                
                // 主標題
                coverSlide.addText('R&D Project', {
                    x: 0.5, y: 1.5, w: 7, h: 0.55,
                    fontSize: 54, bold: true, color: 'FFFFFF',
                    align: 'left', fontFace: 'Arial'
                });
                coverSlide.addText('Review', {
                    x: 0.5, y: 2.05, w: 7, h: 0.55,
                    fontSize: 54, bold: true, color: 'FFFFFF',
                    align: 'left', fontFace: 'Arial'
                });
                
                // 副標題帶底色
                coverSlide.addShape(pptx.ShapeType.rect, {
                    x: 0.5, y: 2.8, w: 4.5, h: 0.4,
                    fill: { color: '4F46E5', transparency: 20 }
                });
                coverSlide.addText('研發專案執行進度與團隊工作分析', {
                    x: 0.65, y: 2.85, w: 4.2, h: 0.3,
                    fontSize: 14, color: 'E0E7FF',
                    align: 'left'
                });
                
                // 統計卡片 - 精美設計
                const stats = [
                    { label: 'Active Projects', sub: '進行中專案', val: activeProjects.length, color: '6366F1', icon: '🚀' },
                    { label: 'Pending Tasks', sub: '執行中任務', val: tasks.filter(t => t.status === 'Doing').length, color: '3B82F6', icon: '⚡' },
                    { label: 'Risk Items', sub: '風險項目', val: tasks.filter(t => t.risk).length, color: 'EF4444', icon: '🔥' },
                    { label: 'Avg Progress', sub: '平均進度', val: Math.round(activeProjects.reduce((sum, p) => sum + (p.progress || 0), 0) / activeProjects.length || 0) + '%', color: '10B981', icon: '📈' }
                ];
                
                stats.forEach((stat, idx) => {
                    const x = 0.5 + (idx * 2.35);
                    
                    // 卡片背景
                    coverSlide.addShape(pptx.ShapeType.rect, {
                        x: x, y: 3.6, w: 2.2, h: 1.3,
                        fill: { color: 'FFFFFF', transparency: 5 },
                        line: { color: 'FFFFFF', width: 0.5, transparency: 80 }
                    });
                    
                    // 圖標
                    coverSlide.addText(stat.icon, {
                        x: x + 0.1, y: 3.7, w: 0.3, h: 0.3,
                        fontSize: 16
                    });
                    
                    // 數值
                    coverSlide.addText(stat.val.toString(), {
                        x: x, y: 3.95, w: 2.2, h: 0.5,
                        fontSize: 36, bold: true, color: stat.color,
                        align: 'center'
                    });
                    
                    // 標籤
                    coverSlide.addText(stat.label, {
                        x: x, y: 4.5, w: 2.2, h: 0.22,
                        fontSize: 10, bold: true, color: 'CBD5E1',
                        align: 'center'
                    });
                    
                    // 副標籤
                    coverSlide.addText(stat.sub, {
                        x: x, y: 4.7, w: 2.2, h: 0.18,
                        fontSize: 7, color: '64748B',
                        align: 'center'
                    });
                });

                // 頁腳資訊
                coverSlide.addText(`Generated: ${new Date().toLocaleDateString('zh-TW')} | R&D Nexus System`, {
                    x: 0.5, y: 5.2, w: 9, h: 0.25,
                    fontSize: 8, color: '64748B',
                    align: 'left'
                });

                // ===== 第二頁：人力資源總覽 =====
                const resourceSlide = pptx.addSlide();
                
                // 背景
                resourceSlide.background = { color: 'FEF3F2' };
                
                // 頂部色帶
                resourceSlide.addShape(pptx.ShapeType.rect, {
                    x: 0, y: 0, w: 10, h: 0.05,
                    fill: { type: 'solid', color: 'F97316' },
                    line: { type: 'none' }
                });
                
                // 標題
                resourceSlide.addText('整體人力資源分析', {
                    x: 0.5, y: 0.3, w: 6, h: 0.5,
                    fontSize: 28, bold: true, color: '1E293B'
                });
                resourceSlide.addText('跨專案人員工作負載與任務分佈總覽', {
                    x: 0.5, y: 0.75, w: 6, h: 0.3,
                    fontSize: 12, color: '64748B'
                });
                
                // 計算全局人力負載
                const allActiveTasks = tasks.filter(t => {
                    const project = projects.find(p => p.id === t.projectId);
                    if (!project || !project.machineId) return false;
                    const machine = machines.find(m => m.id === project.machineId);
                    return machine && machine.status === 'Active' && project.progress < 100;
                });

                const globalWorkload = {};
                allActiveTasks.forEach(t => {
                    const owner = t.owner || 'Unassigned';
                    if (!globalWorkload[owner]) {
                        globalWorkload[owner] = { total: 0, doing: 0, todo: 0, review: 0, projects: new Set() };
                    }
                    globalWorkload[owner].total += 1;
                    if (t.status === 'Doing') globalWorkload[owner].doing += 1;
                    if (t.status === 'To Do') globalWorkload[owner].todo += 1;
                    if (t.status === 'Review') globalWorkload[owner].review += 1;
                    
                    const project = projects.find(p => p.id === t.projectId);
                    if (project) globalWorkload[owner].projects.add(project.id);
                });

                const topWorkers = Object.entries(globalWorkload)
                    .map(([name, data]) => ({ name, ...data, projectCount: data.projects.size }))
                    .sort((a, b) => b.total - a.total)
                    .slice(0, 10);

                const maxLoad = Math.max(...topWorkers.map(w => w.total), 1);

                // 統計卡片
                const resourceStats = [
                    { label: '總專案數', value: activeProjects.length, color: '6366F1' },
                    { label: '總任務數', value: allActiveTasks.length, color: '3B82F6' },
                    { label: '參與人員', value: Object.keys(globalWorkload).length, color: '8B5CF6' },
                    { label: '平均負載', value: Math.round(allActiveTasks.length / Math.max(Object.keys(globalWorkload).length, 1)), color: 'F97316' }
                ];
                
                resourceStats.forEach((stat, idx) => {
                    const x = 6.5 + (idx % 2) * 1.8;
                    const y = 1.3 + Math.floor(idx / 2) * 1.05;
                    
                    resourceSlide.addShape(pptx.ShapeType.rect, {
                        x: x, y: y, w: 1.6, h: 0.9,
                        fill: { color: 'FFFFFF' },
                        line: { color: stat.color, width: 1.5 }
                    });
                    
                    resourceSlide.addText(stat.value.toString(), {
                        x: x, y: y + 0.15, w: 1.6, h: 0.4,
                        fontSize: 24, bold: true, color: stat.color, align: 'center'
                    });
                    
                    resourceSlide.addText(stat.label, {
                        x: x, y: y + 0.55, w: 1.6, h: 0.25,
                        fontSize: 9, color: '64748B', align: 'center'
                    });
                });

                // 人力負載排行表
                resourceSlide.addText('人員工作負載排行 TOP 10', {
                    x: 0.5, y: 1.3, w: 5.5, h: 0.35,
                    fontSize: 14, bold: true, color: '1E293B'
                });

                // 表格標題行
                const tableHeaderY = 1.75;
                ['排名', '姓名', '專案數', 'Doing', 'Review', 'To Do', '合計'].forEach((header, idx) => {
                    const widths = [0.5, 1.2, 0.7, 0.7, 0.7, 0.7, 0.7];
                    const x = 0.5 + widths.slice(0, idx).reduce((a, b) => a + b, 0);
                    
                    resourceSlide.addShape(pptx.ShapeType.rect, {
                        x: x, y: tableHeaderY, w: widths[idx], h: 0.35,
                        fill: { color: 'F97316' }
                    });
                    
                    resourceSlide.addText(header, {
                        x: x, y: tableHeaderY, w: widths[idx], h: 0.35,
                        fontSize: 9, bold: true, color: 'FFFFFF', align: 'center', valign: 'middle'
                    });
                });

                // 表格數據行
                topWorkers.forEach((worker, idx) => {
                    const y = tableHeaderY + 0.35 + (idx * 0.32);
                    const rowColor = idx % 2 === 0 ? 'FFF7ED' : 'FFFFFF';
                    
                    // 背景
                    resourceSlide.addShape(pptx.ShapeType.rect, {
                        x: 0.5, y: y, w: 5.2, h: 0.32,
                        fill: { color: rowColor },
                        line: { color: 'FED7AA', width: 0.5 }
