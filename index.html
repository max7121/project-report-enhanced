                            line: { color: 'E2E8F0', width: 2, dashType: 'dash' }
                        });
                        ganttSlide.addText('📅 尚無任務時程資料', {
                            x: 2, y: 3.4, w: 6, h: 0.6,
                            fontSize: 18, color: '94A3B8', italic: true,
                            align: 'center', valign: 'middle'
                        });
                    }
                    
                    // 頁腳
                    ganttSlide.addText(`Page ${(idx * 2) + 3} | ${machine?.name || project.name} - Schedule`, {
                        x: 0.3, y: 5.5, w: 9.4, h: 0.18,
                        fontSize: 7, color: '94A3B8',
                        align: 'left'
                    });
                });

                // 下載 PPT
                const fileName = `R&D專案會報_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '')}.pptx`;
                await pptx.writeFile({ fileName });
            };

            useEffect(() => {
                const handleKeyPress = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'ArrowLeft') setCurrentSlideIndex(prev => Math.max(0, prev - 1));
                    if (e.key === 'ArrowRight') setCurrentSlideIndex(prev => Math.min(totalSlides - 1, prev + 1));
                    if (e.key === 'f') setIsFocusMode(prev => !prev);
                    if (e.key === 'l') setLaserMode(prev => !prev);
                    if (e.key === 'n') setShowNotes(prev => !prev);
                };
                window.addEventListener('keydown', handleKeyPress);
                return () => window.removeEventListener('keydown', handleKeyPress);
            }, [totalSlides]);

            // 渲染當前內容
            const renderContent = () => {
                if (currentSlideIndex === 0) {
                    // 封面
                    return (
                        <div className="h-full flex flex-col p-16 bg-slate-900 text-white relative overflow-hidden fade-enter-active">
                            <div className="absolute top-0 right-0 w-[800px] h-[800px] bg-indigo-600/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
                            <div className="absolute bottom-0 left-0 w-[600px] h-[600px] bg-purple-600/20 rounded-full blur-3xl translate-y-1/3 -translate-x-1/4"></div>
                            
                            <div className="relative z-10 flex-1 flex flex-col justify-center">
                                <div className="mb-12">
                                    <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-white/10 backdrop-blur-md rounded-full text-xs font-bold tracking-widest text-indigo-300 mb-8 border border-white/10">
                                        <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                        LIVE MEETING MODE
                                    </div>
                                    <h1 className="text-8xl font-black mb-6 leading-tight tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400">
                                        R&D Project<br/>Review
                                    </h1>
                                    <p className="text-2xl font-light text-slate-300">
                                        研發專案執行進度與團隊工作分析
                                    </p>
                                </div>
                                
                                <div className="grid grid-cols-4 gap-6 mt-8">
                                    {[
                                        { label: 'Active Projects', val: activeProjects.length, icon: '🚀', sub: '進行中專案' },
                                        { label: 'Pending Tasks', val: tasks.filter(t => t.status === 'Doing').length, icon: '⚡', sub: '執行中任務' },
                                        { label: 'Risk Items', val: tasks.filter(t => t.risk).length, icon: '🔥', sub: '風險項目', alert: true },
                                        { label: 'Avg Progress', val: `${Math.round(activeProjects.reduce((sum, p) => sum + (p.progress || 0), 0) / activeProjects.length || 0)}%`, icon: '📈', sub: '平均進度' }
                                    ].map((item, i) => (
                                        <div key={i} className={`bg-white/5 backdrop-blur-sm p-6 rounded-2xl border ${item.alert ? 'border-red-500/30 bg-red-500/10' : 'border-white/10'} hover:bg-white/10 transition-all group`}>
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-2xl opacity-50 grayscale group-hover:grayscale-0 transition-all">{item.icon}</span>
                                                {item.alert && <AlertTriangle size={16} className="text-red-400" />}
                                            </div>
                                            <div className="text-4xl font-black mb-1 group-hover:scale-105 transition-transform origin-left">{item.val}</div>
                                            <div className="text-xs font-bold text-slate-400 tracking-wider uppercase">{item.label}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="relative z-10 flex justify-between items-end text-white/30 text-xs font-mono">
                                <span>按 'F' 進入全螢幕專注模式 | 按 'L' 開啟雷射筆</span>
                                <span>{new Date().toLocaleDateString('zh-TW')}</span>
                            </div>
                        </div>
                    );
                }

                if (currentSlideIndex === 1) {
                    // 第二頁：人力資源總覽
                    // 計算全局人力負載
                    const allActiveTasks = tasks.filter(t => {
                        const project = projects.find(p => p.id === t.projectId);
                        if (!project || !project.machineId) return false;
                        const machine = machines.find(m => m.id === project.machineId);
                        return machine && machine.status === 'Active' && project.progress < 100;
                    });

                    const globalWorkload = {};
                    allActiveTasks.forEach(t => {
                        const owner = t.owner || 'Unassigned';
                        if (!globalWorkload[owner]) {
                            globalWorkload[owner] = { total: 0, doing: 0, todo: 0, review: 0, projects: new Set() };
                        }
                        globalWorkload[owner].total += 1;
                        if (t.status === 'Doing') globalWorkload[owner].doing += 1;
                        if (t.status === 'To Do') globalWorkload[owner].todo += 1;
                        if (t.status === 'Review') globalWorkload[owner].review += 1;
                        
                        const project = projects.find(p => p.id === t.projectId);
                        if (project) globalWorkload[owner].projects.add(project.id);
                    });

                    const topWorkers = Object.entries(globalWorkload)
                        .map(([name, data]) => ({ name, ...data, projectCount: data.projects.size }))
                        .sort((a, b) => b.total - a.total)
                        .slice(0, 10);

                    const maxLoad = Math.max(...topWorkers.map(w => w.total), 1);

                    // 專案任務分佈
                    const projectStats = activeProjects.map(p => {
                        const machine = machines.find(m => m.id === p.machineId);
                        const projectTasks = tasks.filter(t => t.projectId === p.id);
                        return {
                            name: machine?.name || p.name,
                            taskCount: projectTasks.length,
                            progress: p.progress || 0
                        };
                    }).sort((a, b) => b.taskCount - a.taskCount).slice(0, 8);

                    return (
                        <div className="h-full flex flex-col p-10 bg-gradient-to-br from-orange-50 via-white to-purple-50 fade-enter-active">
                            {/* 頂部色帶 */}
                            <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-orange-500 via-purple-500 to-indigo-500"></div>
                            
                            {/* 標題 */}
                            <div className="mb-6">
                                <div className="flex items-center gap-4 mb-3">
                                    <span className="px-3 py-1 bg-orange-600 text-white text-xs font-bold rounded-full tracking-wider uppercase shadow-sm">
                                        Resource Overview
                                    </span>
                                    <h2 className="text-4xl font-black text-slate-800 tracking-tight">
                                        整體人力資源分析
                                    </h2>
                                </div>
                                <p className="text-slate-500 text-lg ml-32">
                                    跨專案人員工作負載與任務分佈總覽
                                </p>
                            </div>

                            <div className="grid grid-cols-12 gap-6 flex-1 min-h-0">
                                {/* 左側：人力負載排行 */}
                                <div className="col-span-7 flex flex-col gap-4">
                                    {/* 人力負載卡片 */}
                                    <div className="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 flex flex-col flex-1 min-h-0">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-3">
                                                <div className="p-2 bg-orange-100 rounded-xl"><BarChart2 size={20} className="text-orange-600"/></div>
                                                人員工作負載排行 TOP 10
                                            </h3>
                                            <div className="text-sm text-slate-500">
                                                總計 {allActiveTasks.length} 個活躍任務
                                            </div>
                                        </div>
                                        
                                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                                            {topWorkers.map((worker, idx) => (
                                                <div key={worker.name} className="group">
                                                    <div className="flex items-center gap-3 mb-2">
                                                        <div className="w-8 h-8 rounded-full bg-gradient-to-br from-orange-400 to-purple-500 flex items-center justify-center text-white font-bold text-sm shadow-md">
                                                            {idx + 1}
                                                        </div>
                                                        <div className="flex-1">
                                                            <div className="flex justify-between items-baseline">
                                                                <span className="text-sm font-bold text-slate-800">{worker.name}</span>
                                                                <span className="text-xs text-slate-500">{worker.projectCount} 個專案</span>
                                                            </div>
                                                        </div>
                                                        <div className="text-lg font-black text-orange-600 w-12 text-right">
                                                            {worker.total}
                                                        </div>
                                                    </div>
                                                    
                                                    {/* 進度條 */}
                                                    <div className="flex items-center gap-2 ml-11">
                                                        <div className="flex-1 h-6 bg-slate-100 rounded-full overflow-hidden flex shadow-inner">
                                                            <div className="bg-blue-500 h-full flex items-center justify-center" 
                                                                 style={{width: `${(worker.doing / maxLoad) * 100}%`}}
                                                                 title={`Doing: ${worker.doing}`}>
                                                                {worker.doing > 0 && <span className="text-[9px] text-white font-bold px-1">{worker.doing}</span>}
                                                            </div>
                                                            <div className="bg-amber-400 h-full flex items-center justify-center" 
                                                                 style={{width: `${(worker.review / maxLoad) * 100}%`}}
                                                                 title={`Review: ${worker.review}`}>
                                                                {worker.review > 0 && <span className="text-[9px] text-white font-bold px-1">{worker.review}</span>}
                                                            </div>
                                                            <div className="bg-slate-300 h-full flex items-center justify-center" 
                                                                 style={{width: `${(worker.todo / maxLoad) * 100}%`}}
                                                                 title={`To Do: ${worker.todo}`}>
                                                                {worker.todo > 0 && <span className="text-[9px] text-slate-600 font-bold px-1">{worker.todo}</span>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className="flex justify-end gap-4 text-[10px] text-slate-500 pt-3 border-t border-slate-100 mt-3">
                                            <span className="flex items-center gap-1"><div className="w-3 h-3 bg-blue-500 rounded-full"></div>Doing</span>
                                            <span className="flex items-center gap-1"><div className="w-3 h-3 bg-amber-400 rounded-full"></div>Review</span>
                                            <span className="flex items-center gap-1"><div className="w-3 h-3 bg-slate-300 rounded-full"></div>To Do</span>
                                        </div>
                                    </div>
                                </div>

                                {/* 右側：專案任務分佈 + 統計 */}
                                <div className="col-span-5 flex flex-col gap-4">
                                    {/* 整體統計卡片 */}
                                    <div className="grid grid-cols-2 gap-3">
                                        {[
                                            { label: '總專案數', value: activeProjects.length, icon: '📊', color: 'indigo' },
                                            { label: '總任務數', value: allActiveTasks.length, icon: '📋', color: 'blue' },
                                            { label: '參與人員', value: Object.keys(globalWorkload).length, icon: '👥', color: 'purple' },
                                            { label: '平均負載', value: Math.round(allActiveTasks.length / Math.max(Object.keys(globalWorkload).length, 1)), icon: '⚖️', color: 'orange' }
                                        ].map((stat, idx) => (
                                            <div key={idx} className={`bg-white p-4 rounded-xl shadow-md border border-${stat.color}-100`}>
                                                <div className="text-2xl mb-1">{stat.icon}</div>
                                                <div className={`text-3xl font-black text-${stat.color}-600 mb-1`}>{stat.value}</div>
                                                <div className="text-xs text-slate-500 font-medium">{stat.label}</div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 專案任務排行 */}
                                    <div className="bg-white p-5 rounded-2xl shadow-lg border border-slate-200 flex flex-col flex-1 min-h-0">
                                        <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                            <div className="p-1.5 bg-purple-100 rounded-lg"><Target size={18} className="text-purple-600"/></div>
                                            專案任務數排行
                                        </h3>
                                        
                                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-3">
                                            {projectStats.map((proj, idx) => (
                                                <div key={idx} className="group">
                                                    <div className="flex justify-between items-center mb-1.5">
                                                        <span className="text-sm font-semibold text-slate-700 truncate flex-1" title={proj.name}>
                                                            {proj.name}
                                                        </span>
                                                        <span className="text-sm font-black text-purple-600 ml-2">{proj.taskCount}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                            <div className="h-full bg-gradient-to-r from-purple-500 to-indigo-500 rounded-full transition-all duration-500" 
                                                                 style={{width: `${proj.progress}%`}}>
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] text-slate-400 w-10 text-right">{proj.progress}%</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 頁腳 */}
                            <div className="mt-4 text-xs text-slate-400 text-center">
                                Page 2 | Resource Overview - Generated on {new Date().toLocaleDateString('zh-TW')}
                            </div>
                        </div>
                    );
                }

                // 專案內容頁面計算 (調整索引)
                // index 2 -> Proj 0 Overview
                // index 3 -> Proj 0 Gantt
                // index 4 -> Proj 1 Overview
                // index 5 -> Proj 1 Gantt
                const adjustedIndex = currentSlideIndex - 2;
                const projectIndex = Math.floor(adjustedIndex / 2);
                const isGanttPage = adjustedIndex % 2 === 1;
                const project = activeProjects[projectIndex];

                if (!project) return null;

                if (isGanttPage) {
                    return (
                        <ProjectGanttSlide 
                            project={project}
                            currentSlide={currentSlideIndex}
                            totalProjects={activeProjects.length}
                            machines={machines}
                            tasks={tasks}
                        />
                    );
                } else {
                    return (
                        <ProjectOverviewSlide 
                            project={project}
                            currentSlide={currentSlideIndex}
                            totalProjects={activeProjects.length}
                            machines={machines}
                            tasks={tasks}
                            messages={messages}
                            toggleNotes={() => setShowNotes(!showNotes)}
                        />
                    );
                }
            };

            if (loading) {
                return (
                    <div className="slide-container bg-slate-900">
                        <div className="text-center text-white">
                            <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-lg font-light tracking-widest animate-pulse">SYSTEM LOADING</p>
                        </div>
                    </div>
                );
            }

            // 取得當前專案 ID 以供筆記使用
            const currentProjIndex = Math.floor((currentSlideIndex - 1) / 2);
            const currentProject = currentSlideIndex > 0 ? activeProjects[currentProjIndex] : null;

            return (
                <div className={`slide-container ${isFocusMode ? 'focus-mode' : ''}`}>
                    <div className="slide relative overflow-hidden">
                        {renderContent()}

                        {/* 會議記錄滑出面板 (Global) */}
                        <div className={`absolute top-0 right-0 h-full w-[42%] bg-white shadow-2xl transform transition-transform duration-300 z-10 drawer-panel border-l border-slate-200 ${showNotes && currentSlideIndex > 0 ? 'translate-x-0' : 'translate-x-[110%]'}`}>
                            <div className="h-full relative pt-12">
                                <button 
                                    onClick={() => setShowNotes(false)}
                                    className="absolute top-2 right-2 p-2 hover:bg-slate-100 rounded-full text-slate-500"
                                >
                                    <X size={20} />
                                </button>
                                <MeetingNotes projectId={currentProject?.id} />
                            </div>
                        </div>
                    </div>

                    {/* 控制列 */}
                    <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-slate-900/90 backdrop-blur-xl pl-6 pr-2 py-2 rounded-full shadow-2xl border border-white/10 no-print z-50 transition-all duration-300 ${isFocusMode ? 'translate-y-[150%] hover:translate-y-0' : 'translate-y-0'}`}>
                        <div className="flex items-center gap-4 text-white/80 mr-4 border-r border-white/10 pr-4">
                            <span className="text-xs font-bold tracking-widest w-16 text-center">
                                {currentSlideIndex === 0 ? 'COVER' : `SLIDE ${currentSlideIndex}/${totalSlides-1}`}
                            </span>
                            <MeetingTimer />
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setCurrentSlideIndex(prev => Math.max(0, prev - 1))} disabled={currentSlideIndex === 0} className="p-2.5 rounded-full bg-white/10 text-white hover:bg-indigo-500 disabled:opacity-30 transition-all">
                                <ChevronLeft size={20} />
                            </button>
                            <button onClick={() => setCurrentSlideIndex(prev => Math.min(totalSlides - 1, prev + 1))} disabled={currentSlideIndex === totalSlides - 1} className="p-2.5 rounded-full bg-indigo-600 text-white hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/30">
                                <ChevronRight size={20} />
                            </button>
                        </div>
                        <div className="w-px h-6 bg-white/20 mx-2"></div>
                        <div className="flex gap-1">
                            <button onClick={() => setLaserMode(!laserMode)} className={`p-2.5 rounded-full transition-all ${laserMode ? 'bg-red-500 text-white shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'text-slate-400 hover:text-white hover:bg-white/10'}`} title="雷射筆 (L)">
                                <MousePointer2 size={18} />
                            </button>
                            <button onClick={() => setShowNotes(!showNotes)} className={`p-2.5 rounded-full transition-all ${showNotes ? 'bg-indigo-500 text-white' : 'text-slate-400 hover:text-white hover:bg-white/10'}`} title="會議筆記 (N)">
                                <PenTool size={18} />
                            </button>
                            <button onClick={() => setIsFocusMode(!isFocusMode)} className={`p-2.5 rounded-full transition-all ${isFocusMode ? 'text-blue-400' : 'text-slate-400 hover:text-white hover:bg-white/10'}`} title="專注模式 (F)">
                                {isFocusMode ? <Minimize2 size={18} /> : <Maximize2 size={18} />}
                            </button>
                            <div className="w-px h-6 bg-white/20 mx-1"></div>
                            <button onClick={generatePPT} className="p-2.5 rounded-full text-slate-400 hover:text-green-400 hover:bg-white/10 transition-all" title="下載 PowerPoint">
                                <Download size={18} />
                            </button>
                            <button onClick={() => window.print()} className="p-2.5 rounded-full text-slate-400 hover:text-white hover:bg-white/10 transition-all" title="列印">
                                <Printer size={18} />
                            </button>
                            <button onClick={() => window.location.href = '/server/index.html'} className="p-2.5 rounded-full text-slate-400 hover:text-blue-400 hover:bg-white/10 transition-all" title="回首頁">
                                <Home size={18} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProjectReportPresentation />);
    </script>
</body>
</html>
